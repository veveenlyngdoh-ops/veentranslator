<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Language Translator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Language Translator</h1>

    <div class="lang-bar">
      <div class="lang-group">
        <label for="sourceLang">From</label>
        <select id="sourceLang"></select>
      </div>
      <button id="swapBtn" title="Swap languages">&#8644;</button>
      <div class="lang-group">
        <label for="targetLang">To</label>
        <select id="targetLang"></select>
      </div>
    </div>

    <div class="panels">
      <div class="panel">
        <textarea id="sourceText" placeholder="Enter text to translate..." rows="7"></textarea>
        <div class="panel-actions">
          <button class="icon-btn" id="speakSource" title="Listen to source">&#128266;</button>
          <button class="icon-btn" id="micBtn" title="Speak to translate">&#127908;</button>
          <button class="icon-btn" id="clearBtn" title="Clear text">&#10005;</button>
          <span id="charCount">0 / 5000</span>
        </div>
      </div>

      <div class="panel">
        <textarea id="targetText" placeholder="Translation will appear here..." rows="7" readonly></textarea>
        <div class="panel-actions">
          <button class="icon-btn" id="speakTarget" title="Listen to translation">&#128266;</button>
          <button class="icon-btn" id="copyBtn" title="Copy translation">&#128203;</button>
        </div>
      </div>
    </div>

    <button id="translateBtn">Translate</button>
    <p id="statusMsg" role="status" aria-live="polite"></p>
  </div>

  <script src="app.js"></script>
</body>
</html>
